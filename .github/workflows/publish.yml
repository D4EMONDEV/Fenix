name: Publish

# Builds the Fenix Maven repository and deploys it to GitHub Pages, so mod
# authors can resolve the loader, the API and the Gradle plugin.
#
# Runs on a version tag (v1.2.3), or on demand from the Actions tab. The version
# published is whatever is set in gradle.properties — tag and property should
# match; the tag is just the trigger.
#
# A Maven repository accumulates. Every version ever published has to stay
# reachable, because somewhere a mod's build file names it and will keep naming
# it for years — an artifact that disappears is a mod that stops building.
#
# So the repository lives on a branch of its own, and Pages is pointed straight
# at that branch. Pushing is publishing: there is no artifact to upload and no
# deployment to wait for, the branch is both what is served and the durable
# copy, and the two cannot drift apart because there is only one of them.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# One deployment at a time; let a running one finish rather than cancelling it.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the Maven repository
        run: ./gradlew publishFenixRepo --stacktrace

      - name: Add this version to everything published so far
        env:
          REMOTE: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
        run: |
          set -e
          # Built by hand rather than with actions/checkout: the branch does not
          # exist on the first run, and a checkout that fails still leaves a
          # half-made .git behind for every later command to trip over.
          rm -rf published
          mkdir published
          cd published
          git init -q -b maven-repo
          git remote add origin "$REMOTE"
          # Absent the first time, present every time after. Both are fine.
          git fetch -q --depth 1 origin maven-repo && git reset -q --hard FETCH_HEAD || true
          # Copied over, never cleared: an artifact that disappears is a mod
          # that stops building, and its author cannot bring it back.
          cp -r ../build/fenix-maven-repo/. .
          git add -A
          git -c user.name='github-actions[bot]'               -c user.email='41898282+github-actions[bot]@users.noreply.github.com'               commit -q -m "Publish ${GITHUB_REF_NAME}" || echo "nothing new to publish"
          git push -q origin HEAD:maven-repo
          # The branch is pushed; what Pages serves should be the artifacts and
          # nothing else, least of all the git objects behind them.
          rm -rf .git


  installer:
    # Windows, because jpackage builds for the platform it runs on and the
    # installer carries a Java runtime with it.
    runs-on: windows-latest
    needs: publish
    # A release needs a tag to attach to; a manual run has none, and the Maven
    # half above is useful on its own.
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the installer application
        run: ./gradlew :fenix-installer:distInstaller --stacktrace

      - name: Attach it to the release
        # Without this a player has nothing to download: the Maven repository
        # serves mod authors, and nobody else.
        uses: softprops/action-gh-release@v2
        with:
          files: fenix-installer/build/distributions/*.zip
          generate_release_notes: true
