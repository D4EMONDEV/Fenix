name: Feature request
description: Suggest something Fenix should be able to do
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the goal rather than the solution — there may be a better way to get there.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you have in mind
      description: An API sketch is welcome, even a rough one.

  - type: textarea
    id: alternatives
    attributes:
      label: What you tried instead
      description: Including how other loaders solve it, if they do.

  - type: dropdown
    id: area
    attributes:
      label: Which part of Fenix?
      options:
        - Loader
        - API
        - Ember (asset and data generation)
        - Gradle plugin
        - Installer
        - Documentation or website
        - Not sure
    validations:
      required: true
